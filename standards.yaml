# standards.yaml — Ludwig's project-standards file (the CLAUDE.md analogue for geometry).
#
# The single highest-leverage file: it is how Ludwig knows what "a good part / drawing" means
# for THIS practice. Codegen and the critic both consult it. Non-coders edit it.
# Seeded from the mesh-era standards/{units,tolerances}.md; grows from real use, not speculatively.

units:
  length: mm                 # mm EVERYWHERE — units explicit and asserted (the #1 silent CAD bug)
  angle: deg
  assert_units: true         # every Param must carry a unit; codegen asserts this

tolerances:
  # dimensional verification tolerance — the critic checks named dims to this exactness
  linear: 1.0e-6             # mm; "exact" for the dimensional critic
  bbox_gate: 1.0e-3          # mm; P0 spine gate: bbox within ±this of declared
  angular: 1.0e-4            # deg

# Domain semantics codegen must consult rather than guess (BRIEF §10).
# e.g. an "M8 clearance hole" is ⌀9.0, NOT ⌀8.0.
clearance_holes_mm:          # ISO 273 "medium" fit: nominal -> drilled diameter
  M3: 3.4
  M4: 4.5
  M5: 5.5
  M6: 6.6
  M8: 9.0
  M10: 11.0
  M12: 13.5
  M16: 17.5
  M20: 22.0

# Material definitions — used by the IFC backend for material assignments + property sets.
# Keys are material ids; `ifc_material` is the IFC Material name; `ifc_property_set` triggers
# IFC property-set assignment for the element type. Grows from real use, not speculatively.
materials:
  precast_concrete:
    ifc_material: "PrecastConcrete"
    ifc_property_set: "Pset_PrecastConcrete"
    load_bearing: true
    concrete_strength_class: "C30/37"
    exposure_class: "XC4"
    fire_rating: "R60"
    cover_to_reinforcement_mm: 40
    reinforcement_class: "B500B"
  steel:
    ifc_material: "Steel"
    grade: "S355"

# Maps Element.type -> material key (from materials: above). The IFC backend consults this.
ifc_material_map:
  Panel: precast_concrete
  Part: steel
  Assembly: steel
  Profile: steel
  Wall: precast_concrete
  Slab: precast_concrete
  Column: precast_concrete
  Beam: precast_concrete

manufacturing:
  min_wall_mm: 1.5           # P0 heuristic only — NEVER a P0 gate (OCCT booleans fail here); real analysis P1
  default_material: steel
  cover_mm: 40

# Drawing conventions — the conventioned shop-drawing engine reads ALL of this (BRIEF §7, the moat).
# These are practice conventions, not code: line weights, the sheet, the title block, the standard
# scale ladder, projection angle. A non-coder retunes the house drafting style here.
drawing:
  line_weights_mm:
    cut: 0.50                 # heavy boundary where the section plane cuts solid material
    poche: 0.13              # the poché hatch drawn inside the cut material
    visible: 0.35
    hidden: 0.18
    centre: 0.13
    dimension: 0.13
    border: 0.50
  hlr_algorithm: exact       # exact | polygonal — toggle; polygonal is faster/more robust, faceted curves
  projection: third_angle    # third_angle (US/CAD default) | first_angle (EU): plan above vs below front
  # Sheet (mm). A3 landscape is the shop default; the engine fits the views and picks the scale.
  sheet:
    width_mm: 420
    height_mm: 297
    margin_mm: 12
  # The conventioned scale ladder as denominators: <1 enlarges (0.5 = 2:1), >1 reduces (20 = 1:20).
  # The engine picks the scale that best FILLS the sheet without overflowing (small parts get enlarged).
  scale_ladder: [0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 50, 100, 200, 500]
  # Annotation sizes in PAPER mm (independent of the part's drawing scale).
  text:
    dim_height_mm: 3.0
    arrow_size_mm: 2.5
    title_height_mm: 4.0
    note_height_mm: 2.5
  title_block:
    width_mm: 180
    height_mm: 64
    org: "LUDWIG — generated"
  # Element.type -> the material/finish string printed in the title block. Falls back to the
  # ifc_material_map material name when a type is absent here.
  finish_map:
    Part: "Steel S355"
    Profile: "Steel S355"
    Assembly: "Steel S355 (assembly)"
    Panel: "Precast concrete C30/37"
    Wall: "Precast concrete C30/37"

# IR -> IFC type mapping seed (P1+). Grows as SpatialElement types arrive.
ifc_map:
  Part: IfcBuildingElementProxy
  Panel: IfcWall            # precast wall panel; IFC4precast refinement in P1
  Profile: IfcMember
  Stair: IfcStair           # straight flight (R19); IfcStairFlight decomposition later
  Wall: IfcWall
  Opening: IfcOpeningElement  # door/window void cut in a wall (R22)
  Slab: IfcSlab
  Column: IfcColumn
  Beam: IfcBeam
  Assembly: IfcElementAssembly

# Approved Document K — stair geometry limits by use class (mm / degrees). The compliance critic reads
# these per the brief's use_class (default: general). 2R+G band applies to all classes.
stairs:
  two_r_plus_g: [550, 700]          # 2*rise + going comfort band
  use_classes:
    private:       {rise_max: 220, going_min: 220, pitch_max: 42, width_min: 600}
    general:       {rise_max: 190, going_min: 250, pitch_max: 38, width_min: 1000}
    institutional: {rise_max: 180, going_min: 280, pitch_max: 38, width_min: 1200}

# Inference policy (provider-blind; never sell inference). Model tiering per BRIEF §5.
inference:
  codegen_tier: cheap        # bulk candidate generation
  critic_tier: best          # the verifier / hard reasoning gets the strongest model
  # A tier LABEL -> a model name the provider accepts. The loop passes the resolved model to
  # `--model`; an UNMAPPED label falls back to the provider default (never the literal label,
  # which the CLI rejects). cheap = fast/inexpensive for bulk codegen; best = strongest for repair.
  tiers:
    cheap: haiku
    best: opus
