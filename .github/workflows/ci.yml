name: ci

on:
  push:
    branches: [main, refoundation]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (core + kernel + test)
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML cadquery
      - name: Selftest gate (no LLM tokens)
        run: python cli.py --selftest
      - name: Eval pass-rate (reference builder)
        run: python cli.py --eval
      - name: Unit suite
        run: pytest -q
