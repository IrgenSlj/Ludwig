<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ludwig Studio</title>
<!--
  Ludwig Studio — the rebuilt app shell (the "instant agentic CAD" direction).
  Layout: top header (main actions) · large navigable 3D viewport · footer agent+CLI stripe ·
  two hideable tool rails (2D/3D tools + model tree left, properties right).
  R1: the viewport shows the REAL compiled B-rep from the engine — it boots by POSTing a vendored
  bracket seed to /api/adopt (token-free, no LLM) and rendering the genuine tessellated solid via the
  same mesh path as index.html. Honest empty-stage when there's no geometry. The agent lane + tool
  palette are stubbed and LABELLED as not-yet-wired (no faked AI). Offline: vendored three.js, no CDN.
  window.LUDWIG.render(_assemble dict) is the headless seam. Properties/critic become interactive in R5.
-->
<script type="importmap">
{ "imports": {
  "three": "/vendor/three/three.module.js",
  "three/addons/": "/vendor/three/addons/"
}}
</script>
<style>
  :root{
    --paper:#efece7; --chrome:#e7e3dc; --ink:#1c1a17; --muted:#6e675b; --ink-soft:#322e29;
    --hair:rgba(28,26,23,.14); --hair2:rgba(28,26,23,.30); --accent:#8a5a2b;
    --ok:#3a7d6b; --warn:#b07a2b; --fail:#9e3b30;
    --sans:system-ui,-apple-system,"Inter","Segoe UI",Arial,sans-serif;
    --mono:"SFMono-Regular","JetBrains Mono","IBM Plex Mono",ui-monospace,Menlo,monospace;
    --rail-l:248px; --rail-r:272px; --foot:168px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    height:100vh; display:grid; grid-template-rows:46px 1fr var(--foot);
    background:var(--chrome); color:var(--ink); font-family:var(--sans);
    font-size:13px; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  button{font-family:inherit; color:inherit; cursor:pointer;}

  /* ---------- header ---------- */
  header{
    display:flex; align-items:center; gap:6px; padding:0 12px;
    background:var(--paper); border-bottom:1px solid var(--hair2);
  }
  .brand{font-weight:700; letter-spacing:.16em; font-size:12px; margin-right:4px;}
  .brand .s{font-weight:400; color:var(--muted); letter-spacing:.04em;}
  .file{font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-right:14px;}
  .grp{display:flex; align-items:center; gap:2px; padding:0 8px; border-left:1px solid var(--hair);}
  .grp:first-of-type{border-left:none;}
  header .sp{flex:1;}
  .btn{
    border:1px solid transparent; background:none; border-radius:5px; padding:5px 9px;
    font-size:12px; color:var(--ink-soft); white-space:nowrap;
  }
  .btn:hover{background:rgba(28,26,23,.06);}
  .btn.on{background:var(--ink); color:var(--paper);}
  .btn.ghost{border-color:var(--hair2);}
  .seg{display:flex; border:1px solid var(--hair2); border-radius:6px; overflow:hidden;}
  .seg .btn{border-radius:0; border:none; padding:5px 10px;}
  .seg .btn+.btn{border-left:1px solid var(--hair);}
  .modepill{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted);
    border:1px solid var(--hair2); border-radius:20px; padding:3px 9px;}
  .modepill b{color:var(--accent);}

  /* ---------- main row ---------- */
  main{
    display:grid; grid-template-columns:var(--rail-l) 1fr var(--rail-r);
    min-height:0; background:var(--chrome);
  }
  body.no-left{ --rail-l:0px; }
  body.no-right{ --rail-r:0px; }
  .rail{
    background:var(--paper); min-height:0; display:flex; flex-direction:column;
    overflow:hidden; transition:width .12s ease;
  }
  .rail.l{border-right:1px solid var(--hair2);}
  .rail.r{border-left:1px solid var(--hair2);}
  .rail-h{display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--hair);}
  .rail-h .tab{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
    padding:3px 0; cursor:pointer; border-bottom:2px solid transparent;}
  .rail-h .tab.on{color:var(--ink); border-bottom-color:var(--accent);}
  .rail-b{padding:10px; overflow:auto; min-height:0;}

  /* tool palette */
  .toolgrid{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:14px;}
  .tool{display:flex; flex-direction:column; align-items:center; gap:5px; padding:9px 4px;
    border:1px solid var(--hair); border-radius:6px; background:rgba(255,255,255,.4); font-size:11px;
    color:var(--ink-soft);}
  .tool:hover{border-color:var(--hair2);}
  .tool.on{border-color:var(--accent); color:var(--accent); background:rgba(138,90,43,.06);}
  .tool .ic{font-size:16px; line-height:1;}
  .seclbl{font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted);
    margin:2px 0 8px;}

  /* gallery (demo seed picker) */
  .gallery{display:flex; flex-direction:column; gap:5px; margin-bottom:6px;}
  .gitem{display:flex; flex-direction:column; align-items:flex-start; gap:1px; text-align:left;
    padding:7px 9px; border:1px solid var(--hair); border-radius:6px; background:rgba(255,255,255,.45);}
  .gitem:hover{border-color:var(--accent); background:rgba(138,90,43,.06);}
  .gitem .gt{font-size:12px; color:var(--ink-soft); font-weight:600;}
  .gitem .gb{font-family:var(--mono); font-size:10px; color:var(--muted);}

  /* model tree */
  .tree{font-family:var(--mono); font-size:12px;}
  .tree .node{padding:3px 6px; border-radius:4px; cursor:pointer; display:flex; gap:7px; align-items:center;}
  .tree .node:hover{background:rgba(28,26,23,.05);}
  .tree .node.sel{background:rgba(138,90,43,.10);}
  .tree .ind{color:var(--muted);}
  .tree .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:none;}

  /* properties */
  .prop{margin-bottom:13px;}
  .prop .lbl{display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px;}
  .prop .lbl .nm{color:var(--ink-soft);}
  .prop .row{display:flex; gap:8px; align-items:center;}
  .prop input[type=number]{width:74px; font-family:var(--mono); font-size:12.5px; padding:4px 6px;
    border:1px solid var(--hair2); border-radius:5px; background:#fff; color:var(--ink);}
  .prop input[type=range]{flex:1; accent-color:var(--accent);}
  .prop .unit{font-size:11px; color:var(--muted);}
  .verdict{margin-top:6px; padding:9px 10px; border:1px solid var(--hair); border-radius:6px;
    background:rgba(255,255,255,.4); font-size:11.5px; line-height:1.5;}
  .verdict .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .verdict .mono{font-family:var(--mono);}
  .exports{margin-top:14px; border-top:1px solid var(--hair); padding-top:12px;}
  .exhead{font-size:10px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted); margin-bottom:8px;}
  .exhead .exok{color:var(--ok);}
  .exgrid{display:flex; flex-wrap:wrap; gap:6px;}
  .exchip{display:flex; flex-direction:column; gap:1px; padding:6px 10px; border:1px solid var(--hair2);
    border-radius:6px; text-decoration:none; color:var(--ink); background:var(--paper); min-width:66px;}
  .exchip:hover{border-color:var(--accent); background:rgba(138,90,43,.06);}
  .exchip b{font-size:12px; font-weight:600;}
  .exchip span{font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:.04em;}
  .exdraw{display:block; margin-top:9px; border:1px solid var(--hair2); border-radius:6px; overflow:hidden; background:#fff;}
  .exdraw:hover{border-color:var(--accent);}
  .exdraw img{display:block; width:100%; height:auto;}
  .exdraw .cap{font-size:9.5px; color:var(--muted); padding:3px 7px; border-top:1px solid var(--hair); background:var(--paper);}

  /* ---------- viewport ---------- */
  .stage{position:relative; min-width:0; background:
    radial-gradient(120% 90% at 50% 8%, #f3f1ec 0%, #e4e0d9 55%, #d6d1c8 100%);}
  #view{display:block; width:100%; height:100%;}
  .vp-sketch{position:absolute; inset:0; width:100%; height:100%;}
  .vp-sketch[hidden]{display:none;}
  .vp-sketch .poche{fill:rgba(138,90,43,.10); stroke:var(--accent); stroke-width:1.6; stroke-linejoin:round;}
  .vp-sketch .vtx{fill:var(--accent);}
  .vp-sketch .dimline{stroke:var(--ok); stroke-width:1;}
  .vp-sketch .dimtxt{fill:var(--ok); font:600 11px var(--mono,monospace);}
  .vp-sketch .grid{stroke:rgba(28,26,23,.07); stroke-width:1;}
  .vp-tools{position:absolute; top:10px; right:12px; display:flex; gap:4px; background:rgba(239,236,231,.85);
    border:1px solid var(--hair2); border-radius:7px; padding:3px; backdrop-filter:blur(3px);}
  .vp-tools .btn{padding:4px 8px; font-size:11px;}
  .vp-tools .sep{width:1px;background:var(--hair);margin:3px 1px;}
  .vp-badge{position:absolute; left:12px; top:10px; font-family:var(--mono); font-size:10.5px;
    color:var(--muted); letter-spacing:.04em;}
  .vp-units{position:absolute; left:12px; bottom:10px; font-family:var(--mono); font-size:10.5px; color:var(--muted);}
  .vp-empty{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:9px; text-align:center; padding:0 30px; pointer-events:none;}
  .vp-empty[hidden]{display:none;}
  .vp-empty .k{font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted);}
  .vp-empty .msg{font:600 19px/1.35 Georgia,"Times New Roman",serif; color:var(--ink-soft); max-width:430px;}
  .railtab{position:absolute; top:50%; transform:translateY(-50%); width:16px; height:54px;
    background:var(--paper); border:1px solid var(--hair2); display:flex; align-items:center;
    justify-content:center; cursor:pointer; color:var(--muted); font-size:11px; z-index:3;}
  .railtab.l{left:0; border-left:none; border-radius:0 6px 6px 0;}
  .railtab.r{right:0; border-right:none; border-radius:6px 0 0 6px;}
  body:not(.no-left) .railtab.l{display:none;}
  body:not(.no-right) .railtab.r{display:none;}

  /* ---------- footer: agent + CLI ---------- */
  footer{display:flex; flex-direction:column; background:var(--paper); border-top:1px solid var(--hair2); min-height:0;}
  .foot-h{display:flex; align-items:center; gap:10px; padding:5px 12px; border-bottom:1px solid var(--hair);}
  .foot-h .ttl{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);}
  .foot-h .hint{font-size:11px; color:var(--muted); margin-left:auto; font-family:var(--mono);}
  .log{flex:1; overflow:auto; padding:8px 12px; font-family:var(--mono); font-size:12px; line-height:1.6;}
  .log .ln{display:flex; gap:9px; padding:1px 0;}
  .log .who{flex:none; width:52px; text-transform:uppercase; font-size:9.5px; letter-spacing:.1em; padding-top:3px;}
  .log .who.you{color:var(--accent);}
  .log .who.sys{color:var(--muted);}
  .log .who.agent{color:var(--ok);}
  .log .msg{color:var(--ink-soft); white-space:pre-wrap;}
  .log .msg.ok{color:var(--ok);} .log .msg.warn{color:var(--warn);} .log .msg.err{color:var(--fail);}
  .cli{display:flex; align-items:center; gap:9px; padding:8px 12px; border-top:1px solid var(--hair);}
  .cli .prefix{font-family:var(--mono); color:var(--accent); font-size:13px;}
  .cli input{flex:1; border:none; outline:none; background:none; font-family:var(--mono); font-size:13px; color:var(--ink);}
  .cli input::placeholder{color:var(--muted);}
  .cli .send{border:1px solid var(--hair2); border-radius:6px; padding:5px 12px; font-size:12px; background:none;}
  .cli .send:hover{background:rgba(28,26,23,.06);}
</style>
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header>
    <span class="brand">LUDWIG<span class="s"> studio</span></span>
    <span class="file" id="file">untitled.ldw</span>
    <div class="grp">
      <button class="btn ghost" id="b-new">New</button>
      <button class="btn ghost" id="b-open">Open</button>
      <button class="btn ghost" id="b-save">Save</button>
    </div>
    <div class="grp">
      <div class="seg"><button class="btn on" id="rep-3d">3D</button><button class="btn" id="rep-2d">2D</button></div>
    </div>
    <div class="grp">
      <div class="seg">
        <button class="btn on" id="cam-persp">Persp</button><button class="btn" id="cam-ortho">Ortho</button>
      </div>
      <button class="btn" id="b-fit">Fit</button>
    </div>
    <span class="sp"></span>
    <button class="btn" id="t-left" title="toggle left rail">⮜ Tools</button>
    <button class="btn" id="t-right" title="toggle right rail">Props ⮞</button>
    <span class="modepill" id="agentmode">agent · <b>Plan</b></span>
  </header>

  <!-- ============ MAIN: rails + viewport ============ -->
  <main>
    <!-- LEFT RAIL: tools + model tree -->
    <aside class="rail l">
      <div class="rail-h">
        <span class="tab" data-ltab="tools">Tools</span>
        <span class="tab on" data-ltab="model">Model</span>
      </div>
      <div class="rail-b" id="ltab-tools" hidden>
        <div class="seclbl">3D</div>
        <div class="toolgrid">
          <button class="tool" data-tool="stair"><span class="ic">▟</span>Stair</button>
          <button class="tool" data-tool="box"><span class="ic">▢</span>Box</button>
          <button class="tool" data-tool="extrude"><span class="ic">⬓</span>Extrude</button>
          <button class="tool" data-tool="boolean"><span class="ic">◑</span>Boolean</button>
          <button class="tool" data-tool="fillet"><span class="ic">◜</span>Fillet</button>
          <button class="tool" data-tool="wall"><span class="ic">▥</span>Wall</button>
        </div>
        <div class="seclbl">2D</div>
        <div class="toolgrid">
          <button class="tool" data-tool="line"><span class="ic">╱</span>Line</button>
          <button class="tool" data-tool="rect"><span class="ic">▭</span>Rect</button>
          <button class="tool" data-tool="circle"><span class="ic">◯</span>Circle</button>
          <button class="tool" data-tool="dim"><span class="ic">⊢</span>Dim</button>
          <button class="tool" data-tool="constrain"><span class="ic">⟂</span>Constrain</button>
          <button class="tool" data-tool="section"><span class="ic">⊟</span>Section</button>
        </div>
      </div>
      <div class="rail-b" id="ltab-model">
        <div class="seclbl">Gallery · click to load</div>
        <div class="gallery" id="gallery"><span class="ind" style="font-size:11px">loading…</span></div>
        <div class="seclbl" style="margin-top:12px">Model</div>
        <div class="tree" id="tree"><span class="ind">— nothing loaded yet</span></div>
      </div>
    </aside>

    <!-- VIEWPORT -->
    <section class="stage">
      <canvas id="view"></canvas>
      <svg id="sketch2d" class="vp-sketch" hidden></svg>
      <div class="vp-badge" id="badge">no model — loading…</div>
      <div class="vp-units">mm · Z-up</div>
      <div class="vp-empty" id="empty" hidden>
        <div class="k">Empty stage</div>
        <div class="msg">No model loaded.</div>
      </div>
      <div class="vp-tools">
        <button class="btn" data-view="iso">Iso</button>
        <button class="btn" data-view="top">Top</button>
        <button class="btn" data-view="front">Front</button>
        <div class="sep"></div>
        <button class="btn" id="vp-fit">⤢ Fit</button>
      </div>
      <div class="railtab l" id="show-left">⮞</div>
      <div class="railtab r" id="show-right">⮜</div>
    </section>

    <!-- RIGHT RAIL: properties -->
    <aside class="rail r">
      <div class="rail-h"><span class="tab on">Properties</span><span class="tab" style="color:var(--muted)">Inspector</span></div>
      <div class="rail-b" id="props"></div>
    </aside>
  </main>

  <!-- ============ FOOTER: agent + CLI ============ -->
  <footer>
    <div class="foot-h">
      <span class="ttl">Agent &amp; command line</span>
      <span class="hint" id="foot-hint">type a command — e.g. <b>iso</b> · <b>ortho</b> · or <b>help</b></span>
    </div>
    <div class="log" id="log"></div>
    <div class="cli">
      <span class="prefix" id="cli-prefix">›</span>
      <input id="cli" autocomplete="off" spellcheck="false"
             placeholder="command (iso · top · front · ortho · persp · fit) — or describe a change for the agent…">
      <button class="send" id="cli-send">Run</button>
    </div>
  </footer>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const $ = s => document.querySelector(s);

/* ===================== viewport ===================== */
const canvas = $("#view");
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
const persp = new THREE.PerspectiveCamera(40, 1, 0.1, 1e7); persp.up.set(0,0,1);
const ortho = new THREE.OrthographicCamera(-1,1,1,-1,-1e6,1e7); ortho.up.set(0,0,1);
let cam = persp;
const controls = new OrbitControls(cam, canvas);
controls.enableDamping = true; controls.screenSpacePanning = true;
scene.add(new THREE.HemisphereLight(0xffffff, 0x9a948a, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 1.35); key.position.set(0.6,-1,1.4); scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.45); fill.position.set(-1,0.5,0.4); scene.add(fill);
let model=null, grid=null, userMoved=false;

function sizeView(){
  const r = canvas.parentElement.getBoundingClientRect();
  renderer.setSize(r.width, r.height);
  persp.aspect = r.width/Math.max(r.height,1); persp.updateProjectionMatrix();
}
function frame(dir){
  if(!model) return;
  sizeView();
  const box = new THREE.Box3().setFromObject(model);
  if(box.isEmpty()) return;
  const c = box.getCenter(new THREE.Vector3());
  const radius = Math.max(box.getBoundingSphere(new THREE.Sphere()).radius, 1);
  const d = (dir||new THREE.Vector3(0.85,-1,0.62)).clone().normalize();
  const fov = THREE.MathUtils.degToRad(persp.fov);
  let dist = radius/Math.sin(fov/2); if(persp.aspect<1) dist/=persp.aspect; dist*=1.3;
  persp.position.copy(c).addScaledVector(d, dist);
  persp.near = Math.max(dist/1000,0.01); persp.far = dist*100; persp.updateProjectionMatrix();
  const s = radius*1.35, a = persp.aspect;
  ortho.left=-s*a; ortho.right=s*a; ortho.top=s; ortho.bottom=-s;
  ortho.position.copy(c).addScaledVector(d, dist); ortho.near=0.01; ortho.far=dist*100; ortho.updateProjectionMatrix();
  cam.up.set(0,0,1);
  controls.target.copy(c); controls.update(); userMoved=false;
}
new ResizeObserver(()=>{ sizeView(); if(!userMoved) frame(); }).observe($(".stage"));
controls.addEventListener("start", ()=>{ userMoved=true; });
canvas.addEventListener("dblclick", ()=>frame());
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene, cam); })();

/* ===================== geometry: real OCCT B-rep (ported from index.html) ===================== */

function buildSolid(mesh) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(mesh.positions, 3));
  geo.setIndex(mesh.indices);
  geo.computeVertexNormals();
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color:0xb8b2a6, metalness:0.25, roughness:0.62, flatShading:true });
  g.add(new THREE.Mesh(geo, mat));
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo, 24), new THREE.LineBasicMaterial({ color:0x2b2824 })));
  return { group: g, mat };
}

/* ---- Ambient Correctness (R6): the deterministic critic painted onto the geometry. A subtle
   always-on wash of each solid's critic colour (teal verified · amber below-spec · red fail),
   brighter on select, faded when another element is the focus. "Calm, not alarmist." ---- */
let childMats = {};                                       // element id → its mesh material
let AMBIENT = { overall:"ok", byId:{}, colorOf:()=>0x3a7d6b };
const _RANK = { ok:0, warn:1, fail:2 };
function _statusOf(checks){
  let s="ok";
  for(const c of checks) if(c.status==="fail"){ const cur=c.severity==="warning"?"warn":"fail"; if(_RANK[cur]>_RANK[s]) s=cur; }
  return s;
}
function ambientStatus(d){
  const colorOf = s => s==="fail"?0x9e3b30 : s==="warn"?0xb07a2b : 0x3a7d6b;   // --fail / --warn / --ok
  const checks = d.critic || [];
  const byId = {};
  new Set(checks.map(c=>c.element_id).filter(Boolean)).forEach(
    id => byId[id] = _statusOf(checks.filter(c=>c.element_id===id)));
  return { overall:_statusOf(checks), byId, colorOf };
}
function paintMat(mat, { selected=false, faded=false }={}){
  const amb = mat.userData.ambient ?? 0x3a7d6b;
  mat.emissive = new THREE.Color(amb);
  mat.emissiveIntensity = selected ? 0.5 : 0.14;
  mat.transparent = faded; mat.opacity = faded ? 0.18 : 1.0; mat.depthWrite = !faded;
  mat.needsUpdate = true;
}
function applyAmbient(d){
  AMBIENT = ambientStatus(d);
  for(const [id, mat] of Object.entries(childMats)){
    mat.userData.ambient = AMBIENT.colorOf(AMBIENT.byId[id] || AMBIENT.overall);
    paintMat(mat, {});
  }
}

/* ---- Point-to-Navigate (R6): pick a solid → its model-tree node highlights, and vice-versa.
   Geometry is the index into the program; selection resolves to a program node by lineage, never a
   kernel handle ([H2]). A drag is an orbit, not a pick (movement threshold separates them). ---- */
function setSelection(id){
  for(const [cid, mat] of Object.entries(childMats))
    paintMat(mat, { selected: id!==null && cid===id, faded: id!==null && cid!==id });
}
function pulseAll(){
  Object.values(childMats).forEach(m=>paintMat(m,{selected:true}));
  setTimeout(()=>Object.values(childMats).forEach(m=>paintMat(m,{})), 650);
}
function selectFromStage(id){
  document.querySelectorAll("#tree .node").forEach(n=> n.classList.toggle("sel", n.dataset.elid===id));
  setSelection(id);
}
function clearStageSelection(){
  document.querySelectorAll("#tree .node").forEach(n=> n.classList.remove("sel"));
  setSelection(null);
}
/* ===================== face-drag write-back (R10 — the marquee) =====================
   Pick a face → a drag arrow appears along its normal, bound to the extent dim on that world axis (R9
   metadata: length=0 · width=1 · height=2). Dragging the arrow streams /api/preview (camera fixed) so the
   extent grows live under the cursor — no LLM, no files; release commits via /api/edit as a +1/−1 minimal
   diff. Output-directed editing: you manipulate the geometry, Ludwig writes the parameter. */
const _ray = new THREE.Raycaster(); let _downXY = null;
let faceGizmo = null, DRAG = null;
const _AXES = [new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)];

function dimForAxis(axisIndex){
  const dims = (STATE.payload && STATE.payload.dims) || [];
  return dims.find(d => d.axis === axisIndex && d.editable) || null;
}
function clearFaceGizmo(){ if(faceGizmo){ scene.remove(faceGizmo); faceGizmo = null; } }
function rayOD(e){
  const r = canvas.getBoundingClientRect();
  _ray.setFromCamera(new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1), cam);
  return { O:_ray.ray.origin.clone(), D:_ray.ray.direction.clone() };
}
function closestTOnAxis(C, A, O, D){       // param t on line (C + tA) closest to ray (O + sD) — skew lines
  const w0 = C.clone().sub(O);
  const a=A.dot(A), b=A.dot(D), c=D.dot(D), d=A.dot(w0), e2=D.dot(w0), denom=a*c-b*b;
  return Math.abs(denom) < 1e-9 ? 0 : (b*e2 - c*d) / denom;
}
function showFaceGizmo(hit){
  clearFaceGizmo();
  if(!hit || !hit.face || REP!=="3d" || SECTION.on || !model) return;
  const nrm = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
  let ax=0, best=-1; for(let i=0;i<3;i++){ const m=Math.abs(nrm.getComponent(i)); if(m>best){ best=m; ax=i; } }
  const dim = dimForAxis(ax); if(!dim) return;           // no editable extent on this axis (e.g. a hole face)
  const sign = nrm.getComponent(ax) >= 0 ? 1 : -1;
  const A = _AXES[ax].clone().multiplyScalar(sign);
  const box = new THREE.Box3().setFromObject(model);
  const C = box.getCenter(new THREE.Vector3());
  const R = Math.max(box.getSize(new THREE.Vector3()).length()/2, 1), len = R*0.55;
  const mat = new THREE.MeshBasicMaterial({ color:0x8a5a2b, depthTest:false, transparent:true });
  const g = new THREE.Group();
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(R*0.018, R*0.018, len*0.7, 12), mat);
  const head  = new THREE.Mesh(new THREE.ConeGeometry(R*0.06, len*0.3, 18), mat);
  shaft.position.y = len*0.35; head.position.y = len*0.85;
  g.add(shaft); g.add(head);
  g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), A);
  g.position.copy(C).addScaledVector(A, dim.value/2);
  g.renderOrder = 999;
  g.userData.face = { ax, A, dim:dim.name, old:dim.value, C };
  scene.add(g); faceGizmo = g;
}

canvas.addEventListener("pointerdown", e=>{
  _downXY=[e.clientX, e.clientY];
  if(faceGizmo){                                         // grabbing the arrow starts a face-drag, not an orbit
    _ray.setFromCamera(new THREE.Vector2(
      ((e.clientX-canvas.getBoundingClientRect().left)/canvas.getBoundingClientRect().width)*2-1,
      -((e.clientY-canvas.getBoundingClientRect().top)/canvas.getBoundingClientRect().height)*2+1), cam);
    if(_ray.intersectObject(faceGizmo, true).length){
      const f = faceGizmo.userData.face, {O,D} = rayOD(e);
      DRAG = { ...f, t0: closestTOnAxis(f.C, f.A, O, D), new: f.old };
      controls.enabled = false;                          // suspend orbit for the duration of the drag
    }
  }
});
window.addEventListener("pointermove", e=>{
  if(!DRAG) return;
  const {O,D} = rayOD(e);
  const val = Math.max(1, Math.round(DRAG.old + 2*(closestTOnAxis(DRAG.C, DRAG.A, O, D) - DRAG.t0)));
  DRAG.new = val;
  livePreview({ name:DRAG.dim, old:DRAG.old, new:val });   // stream the extent live (coalesced, no LLM/files)
  if(faceGizmo) faceGizmo.position.copy(DRAG.C).addScaledVector(DRAG.A, val/2);   // arrow tracks the face
});
window.addEventListener("pointerup", e=>{
  if(DRAG){                                              // release → commit the new extent (+1/−1 diff)
    controls.enabled = true;
    const d = DRAG; DRAG = null; _downXY = null;
    if(d.new && d.new !== d.old) applyEdit(`make the ${d.dim} ${d.new} mm`, { name:d.dim, old:d.old, new:d.new });
    return;
  }
  if(!_downXY) return;
  const moved = Math.hypot(e.clientX-_downXY[0], e.clientY-_downXY[1]); _downXY=null;
  if(moved>5 || !model) return;                          // a drag is an orbit, not a pick
  const r = canvas.getBoundingClientRect();
  _ray.setFromCamera(new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1), cam);
  const hits = _ray.intersectObjects(model.children, true);
  const hit = hits.length ? hits[0] : null;
  let o = hit ? hit.object : null;
  while(o && o.userData.elementId===undefined) o = o.parent;
  if(o && o.userData.elementId){ selectFromStage(o.userData.elementId); showFaceGizmo(hit); }
  else { clearStageSelection(); clearFaceGizmo(); }
});

function showGeometry(d, opts) {
  opts = opts || {};
  if (model) { scene.remove(model); model = null; }
  if (grid)  { scene.remove(grid);  grid  = null; }

  const has = m => m && m.positions && m.positions.length;
  const solids = (d.children && d.children.length)
    ? d.children.filter(c => has(c.mesh)).map(c => ({ id: c.id, mesh: c.mesh }))
    : (has(d.mesh) ? [{ id: d.id, mesh: d.mesh }] : []);
  if (!solids.length) return false;

  model = new THREE.Group();
  childMats = {};
  for (const s of solids) {
    const b = buildSolid(s.mesh);
    b.group.userData.elementId = s.id;
    childMats[s.id] = b.mat;                              // for per-child select + ambient wash
    model.add(b.group);
  }
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const c   = box.getCenter(new THREE.Vector3());
  const R   = Math.max(box.getSize(new THREE.Vector3()).length() / 2, 1);
  const gh  = new THREE.GridHelper(R * 4, 20, 0xcfc9bf, 0xdedacf);
  gh.rotation.x = Math.PI / 2;
  gh.position.set(c.x, c.y, box.min.z - 0.5);
  scene.add(gh); grid = gh;

  applyAmbient(d);                                         // paint the critic verdict onto the solids
  if (opts.refit !== false) { userMoved=false; frame(); }
  return true;
}

/* ===================== window.LUDWIG seam (token-free test injection) ===================== */
const STATE = { program: null, payload: null, sketch2d: null };
let REP = "3d";   // "3d" = the extrude · "2d" = the constrained sketch (R34)

function render(payload) {
  if (!payload || payload.fatal) {
    emptyStage(payload && payload.fatal ? "engine error · " + payload.fatal : "no model — start the engine");
    return;
  }
  const drew = showGeometry(payload);            // false → there's no display mesh (e.g. no kernel)
  if (!drew) {
    emptyStage(payload.id ? "compiled, but no display geometry (kernel may be absent)"
                          : "no model — start the engine");
    return;
  }
  $("#empty").hidden = true;                      // honest empty-stage overlay off once a solid is shown
  clearFaceGizmo();                               // a fresh payload retires any stale drag arrow (R10)
  STATE.payload = payload;
  STATE.program = payload.program || null;
  if (payload.sketch2d !== undefined) STATE.sketch2d = payload.sketch2d;   // R34: the solved 2D profile
  if (REP === "2d") renderSketch2d(STATE.sketch2d);

  const id   = payload.id   || "model";
  const type = payload.type || "";
  const bb   = payload.bbox;
  const bbtxt = bb ? ` · ${bb.length}×${bb.width}×${bb.height} mm` : "";
  $("#badge").textContent = `${id}${type ? " · " + type : ""}${bbtxt}`;

  buildTree(payload);
  buildProps(payload);
}

// Left · model tree (R6): payload-driven + click-to-isolate. Clicking the head pulses the whole
// part/assembly; clicking a child isolates that solid on the Stage (lineage, never a kernel handle).
function buildTree(d) {
  const id = d.id || "model", type = (d.type || "").toLowerCase();
  const head = `<div class="node sel" data-elid="${id}" data-head="1"><span class="dot"></span>${id}<span class="ind" style="margin-left:auto">${type}</span></div>`;
  const kids = (d.children && d.children.length)
    ? d.children.map(c => `<div class="node" data-elid="${c.id}" style="padding-left:22px"><span class="dot"></span>${c.id}<span class="ind" style="margin-left:auto">${(c.type||"").toLowerCase()}</span></div>`).join("")
    : (d.dims || []).map(x => `<div class="node" style="padding-left:22px"><span class="ind">·</span> ${x.name} ${x.value} ${x.unit||"mm"}</div>`).join("");
  const tree = $("#tree"); tree.innerHTML = head + kids;
  tree.querySelectorAll(".node[data-elid]").forEach(n => n.addEventListener("click", () => {
    if (n.dataset.head === "1") {                          // the whole part/assembly
      document.querySelectorAll("#tree .node").forEach(x => x.classList.toggle("sel", x === n));
      setSelection(null); pulseAll();
    } else selectFromStage(n.dataset.elid);                // isolate one child
  }));
}

// Right · properties (R5): a slider per editable extent dim bound to the manifest — drag previews
// geometry live via /api/preview (no LLM, no files), release commits via /api/edit. Other named dims
// are read-only rows. Below them, the REAL deterministic critic verdict from payload.critic.
const EDITABLE = new Set(["length", "width", "height", "thickness", "diameter", "rise", "going", "riser_count", "depth"]);
const isEditableDim = n => EDITABLE.has(n) || /^[dr]_/.test(n);   // R34: d_*/r_* are sketch distance/radius dims
function buildProps(d) {
  const props = $("#props"); props.innerHTML = "";
  const dims = d.dims || [];
  const seen = new Set();
  const editable = dims.filter(x => isEditableDim(x.name) && !seen.has(x.name) && seen.add(x.name));
  // a value shared by two extents (a 30×30 square) can't be disambiguated by literal substitution —
  // its slider still commits via /api/edit (LLM), but the live preview is disabled to avoid moving both.
  const valCount = {}; editable.forEach(x => valCount[x.value] = (valCount[x.value] || 0) + 1);
  editable.forEach(x => {
    const lo = Math.max(1, Math.round(x.value * 0.4)), hi = Math.max(lo + 1, Math.round(x.value * 2.2));
    const el = document.createElement("div"); el.className = "prop";
    el.innerHTML =
      `<div class="lbl"><span class="nm">${x.name}</span><span class="unit">${x.value} ${x.unit||"mm"}</span></div>
       <div class="row"><input type="range" min="${lo}" max="${hi}" step="1" value="${x.value}"></div>`;
    const range = el.querySelector("input"), valLbl = el.querySelector(".unit");
    // a sketch dim always previews — the backend disambiguates by dim name (d_L1 → line L1), so the two
    // equal 10 mm legs move independently; a plain extent needs a unique literal to substitute safely.
    const canPreview = /^[dr]_/.test(x.name) || valCount[x.value] === 1;
    range.addEventListener("input", () => {
      valLbl.textContent = range.value + " " + (x.unit || "mm");
      if (canPreview) livePreview({ name: x.name, old: x.value, new: Number(range.value) });
    });
    range.addEventListener("change", () => applyEdit(
      "make the " + x.name + " " + range.value + " mm",
      { name: x.name, old: x.value, new: Number(range.value) }));
    props.appendChild(el);
  });
  dims.filter(x => !isEditableDim(x.name)).forEach(x => {          // remaining dims, read-only
    const el = document.createElement("div"); el.className = "prop"; el.style.marginBottom = "6px";
    el.innerHTML = `<div class="lbl"><span class="nm">${x.name}</span><span class="unit">${x.value} ${x.unit||"mm"}</span></div>`;
    props.appendChild(el);
  });
  const checks = d.critic || [];                                  // the real deterministic verdict
  const v = document.createElement("div"); v.className = "verdict"; v.id = "verdict";
  if (!checks.length) {
    v.innerHTML = '<span style="color:var(--muted)">critic — no checks</span>';
  } else {
    const fails = checks.filter(c => c.status === "fail");
    const warnOnly = fails.length > 0 && fails.every(c => c.severity === "warning");
    const col = !fails.length ? "var(--ok)" : warnOnly ? "var(--warn)" : "var(--fail)";
    const head = !fails.length ? "Verified · all checks pass" : warnOnly ? "Below spec" : fails.length + " failing";
    v.innerHTML = `<span class="dot" style="background:${col}"></span><b>${head}</b>`
      + checks.map(c => `<div class="mono" style="color:var(--muted);margin-top:4px">`
          + `${c.status === "fail" ? "✗" : c.status === "pass" ? "✓" : "·"} ${c.check}`
          + `${c.message ? " — " + c.message : ""}</div>`).join("");
  }
  props.appendChild(v);
  const ex = buildExports(d); if (ex) props.appendChild(ex);   // the verified fab files, downloadable
}

// The moat, made tangible: once the critic passes, the derived fabrication files are downloadable
// straight from the viewport — STEP for CAM, IFC for BIM, dimensioned shop + section DXF a fabricator
// builds from, and the re-promptable recipe. Written server-side on load/commit (never on a failing
// critic — the fab gate), served from /out/. This is the whole "verified fabricability" thesis on screen.
function buildExports(d) {
  const a = d.artifacts || {};
  const fails = (d.critic || []).filter(c => c.status === "fail");
  if (fails.length || !(a.step || a.dxf)) return null;         // no files leave on a failing critic
  const files = [
    ["STEP", a.step, "exact solid · CAD/CAM"],
    ["IFC", a.ifc, "BIM exchange"],
    ["Shop DXF", a.dxf, "dimensioned drawing"],
    ["Section", a["section-dxf"], "poché cut sheet"],
    ["Recipe", a.recipe, "re-promptable program"],
  ].filter(f => f[1]);
  if (!files.length) return null;
  const wrap = document.createElement("div"); wrap.className = "exports";
  wrap.innerHTML = `<div class="exhead">Fabrication exports · <span class="exok">verified</span></div>`
    + `<div class="exgrid">` + files.map(([label, file, desc]) =>
        `<a class="exchip" href="/out/${file}" download title="${desc}">`
        + `<b>${label}</b><span>${file.split(".").pop().toUpperCase()}</span></a>`).join("") + `</div>`;
  if (a.drawing_preview) {                                     // the conventioned shop drawing — the moat, visible
    wrap.innerHTML += `<a class="exdraw" href="/out/${a.drawing_preview}" target="_blank" rel="noopener"`
      + ` title="conventioned multi-view shop drawing — click to open full size">`
      + `<img src="/out/${a.drawing_preview}?v=${Date.now()}" alt="shop drawing preview">`
      + `<div class="cap">conventioned shop drawing · third-angle · click to enlarge</div></a>`;
  }
  return wrap;
}

// Live direct-manipulation: a slider drag previews geometry in real time (no LLM, no files). Calls
// are COALESCED — at most one /api/preview in flight, always rendering the latest value — so a fast
// drag stays smooth. The program text is unchanged during a drag, so STATE.program is left intact;
// release runs the real /api/edit (fab-gated, minimal-diff) via applyEdit.
let _previewInFlight = false, _previewPending = null;
function livePreview(param) {
  if (!STATE.program) return;
  _previewPending = param;
  if (!_previewInFlight) pumpPreview();
}
async function pumpPreview() {
  if (_previewPending == null) { _previewInFlight = false; return; }
  _previewInFlight = true;
  const param = _previewPending; _previewPending = null;
  try {
    const r = await fetch("/api/preview", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ program: STATE.program, param }) });
    const d = await r.json();
    if (d && d.ok) {
      showGeometry(d, { refit: false });                // swap the 3D mesh in place; keep the camera put
      if (d.sketch2d !== undefined) {                   // R34: the solved 2D profile came back too
        STATE.sketch2d = d.sketch2d;
        if (REP === "2d") renderSketch2d(STATE.sketch2d);   // 2D sketch + 3D extrude update in lockstep
      }
    }
  } catch (e) { /* drop this frame, keep the last good mesh */ }
  pumpPreview();
}
async function applyEdit(instruction, param) {
  if (!STATE.program) return;
  log("you", instruction);
  document.querySelectorAll("#props input").forEach(i => i.disabled = true);
  try {
    const r = await fetch("/api/edit", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ program: STATE.program, instruction, param }) });
    const d = await r.json();
    if (d.fatal) { log("sys", "edit failed: " + d.fatal, "err"); return; }
    render(d);
    if (d.diff) log("sys", (d.fast ? "instant parametric edit (no model call)" : "minimal-diff edit")
      + " · +" + d.diff.added + " / −" + d.diff.removed + " line(s)"
      + (d.rounds ? " · " + d.rounds + " repair round(s)" : ""), "ok");
  } catch (e) { log("sys", "edit request failed: " + e, "err"); }
  finally { document.querySelectorAll("#props input").forEach(i => i.disabled = false); }
}

/* ===================== live cut plane (R33) =====================
   The Section tool slices the loaded solid at a plane and shows the kept half — a token-free
   /api/section call (execute + OCCT section + tessellate; no LLM, no backends). Axis buttons pick the
   cut normal; the slider sweeps the plane through the part; both re-cut live and COALESCED (at most one
   request in flight). Exit restores the full solid. The default plane is the centroidal-longitudinal
   one the section DRAWING backend (R30) draws, so the live 3D slice and the DXF agree. */
const SECTION = { on:false, axis:null, offset:0, span:null };
let _secInFlight=false, _secPending=null;
function liveSection(axis, offset, axisChanged){
  if(!STATE.program){ log("sys","load a model first.","warn"); return; }
  _secPending = { axis, offset, axisChanged };
  if(!_secInFlight) pumpSection();
}
async function pumpSection(){
  if(_secPending==null){ _secInFlight=false; return; }
  _secInFlight=true;
  const req=_secPending; _secPending=null;
  try{
    const r = await fetch("/api/section", { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ program: STATE.program, axis:req.axis, offset:req.offset }) });
    const d = await r.json();
    if(d && d.ok) onSectionResult(d, req.axisChanged);
    else if(d){ const ro=$("#secReadout"); if(ro) ro.textContent = d.reason || "empty section"; }
  }catch(e){ /* drop this frame, keep the last good slice */ }
  pumpSection();
}
function onSectionResult(d, axisChanged){
  SECTION.axis=d.axis; SECTION.offset=d.offset; SECTION.span=d.span;
  showGeometry({ id:d.id, mesh:d.mesh }, { refit:false });     // swap in the cut half, keep the camera
  $("#badge").textContent = `${d.id} · section ⟂${d.axis.toUpperCase()} @ ${(+d.offset).toFixed(1)} mm`;
  if(axisChanged) rebuildSectionSlider(); else updateSectionReadout();
  document.querySelectorAll(".secax").forEach(b=> b.classList.toggle("on", b.dataset.ax===SECTION.axis));
}
function toggleSection(){
  const btn = document.querySelector('.tool[data-tool="section"]');
  if(SECTION.on){                                              // exit → restore the full solid + props
    SECTION.on=false; if(btn) btn.classList.remove("on");
    if(STATE.payload) render(STATE.payload);
    log("sys","exited section — full solid restored.");
    return;
  }
  if(!STATE.program){ log("sys","load a model first.","warn"); return; }
  SECTION.on=true; if(btn) btn.classList.add("on");
  clearFaceGizmo();                                            // face-drag arrow doesn't belong on a slice
  buildSectionControls();
  liveSection(null, null, true);                               // default centroidal-longitudinal plane
  log("sys","section — live cut plane (token-free). Drag to sweep; pick X/Y/Z for the cut normal.","ok");
}
function buildSectionControls(){
  const props=$("#props"); props.innerHTML="";
  const wrap=document.createElement("div"); wrap.className="prop";
  wrap.innerHTML =
    `<div class="lbl"><span class="nm">cut plane</span><span class="unit" id="secReadout">…</span></div>
     <div class="row" style="gap:6px;margin:6px 0 10px">
       ${["x","y","z"].map(a=>`<button class="tool secax" data-ax="${a}" style="flex:1;padding:5px 0">${a.toUpperCase()}</button>`).join("")}
     </div>
     <div class="row"><input type="range" id="secOffset" disabled></div>
     <div class="row" style="margin-top:12px"><button class="tool" id="secExit" style="width:100%;flex-direction:row">Exit section</button></div>`;
  props.appendChild(wrap);
  wrap.querySelectorAll(".secax").forEach(b=> b.addEventListener("click", ()=> liveSection(b.dataset.ax, null, true)));
  wrap.querySelector("#secExit").addEventListener("click", toggleSection);
}
function rebuildSectionSlider(){
  const s=$("#secOffset"); if(!s || SECTION.span==null) return;
  const half=SECTION.span/2;
  s.min=(-half).toFixed(2); s.max=half.toFixed(2); s.step=Math.max(0.25, SECTION.span/240).toFixed(2);
  s.value=SECTION.offset; s.disabled=false;
  s.oninput=()=> liveSection(SECTION.axis, Number(s.value), false);
  updateSectionReadout();
}
function updateSectionReadout(){
  const r=$("#secReadout");
  if(r) r.textContent = `⟂${(SECTION.axis||"").toUpperCase()} @ ${(+SECTION.offset).toFixed(1)} mm`;
}

/* ===================== 2D sketch view (R34) =====================
   The "2D" representation draws the REAL constrained sketch — the solved outer profile the backend
   recovers by sectioning the extrude (sketch2d). Dragging a sketch dimension re-solves server-side and
   this redraws live, in lockstep with the 3D extrude. Token-free; no compile, no LLM. */
function setRep(rep){
  REP = rep;
  $("#rep-3d").classList.toggle("on", rep==="3d");
  $("#rep-2d").classList.toggle("on", rep==="2d");
  const svg = $("#sketch2d"), canvas = $("#view");
  const on2d = rep==="2d";
  // NB: <svg> is an SVGElement, which does not reflect the `hidden` PROPERTY to the attribute the way
  // HTMLElement does — so toggle the attribute explicitly, or the [hidden]{display:none} rule sticks.
  if(on2d) svg.removeAttribute("hidden"); else svg.setAttribute("hidden","");
  canvas.style.visibility = on2d ? "hidden" : "visible";
  if(on2d){ clearFaceGizmo(); renderSketch2d(STATE.sketch2d); }   // face-drag is a 3D-only tool (R10)
}
function renderSketch2d(loop){
  const svg = $("#sketch2d");
  if(!loop || loop.length < 3){
    svg.removeAttribute("viewBox");
    svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" '
      + 'fill="#8a8577" font-size="13" font-family="Georgia,serif">no 2D sketch for this part — draw or load a sketched part</text>';
    return;
  }
  const xs=loop.map(p=>p[0]), ys=loop.map(p=>p[1]);
  const minx=Math.min(...xs), maxx=Math.max(...xs), miny=Math.min(...ys), maxy=Math.max(...ys);
  const w=(maxx-minx)||1, h=(maxy-miny)||1, pad=Math.max(w,h)*0.22, S=Math.max(w,h);
  svg.setAttribute("viewBox", `${minx-pad} ${-(maxy+pad)} ${w+2*pad} ${h+2*pad}`);
  svg.setAttribute("preserveAspectRatio","xMidYMid meet");
  const P = loop.map(p=>`${p[0]},${-p[1]}`).join(" ");     // flip Y so sketch-up is screen-up
  const r = S*0.013, dh = S*0.05;
  let g = "";
  g += `<polygon class="poche" points="${P}"/>`;
  loop.forEach(p=> g += `<circle class="vtx" cx="${p[0]}" cy="${-p[1]}" r="${r}"/>`);
  // overall width dim (below) + height dim (left) — the sketch reads dimensioned
  const yb = -miny + dh, xl = minx - dh;
  g += `<line class="dimline" x1="${minx}" y1="${yb}" x2="${maxx}" y2="${yb}"/>`;
  g += `<text class="dimtxt" x="${(minx+maxx)/2}" y="${yb + dh*0.9}" text-anchor="middle">${w.toFixed(0)}</text>`;
  g += `<line class="dimline" x1="${xl}" y1="${-miny}" x2="${xl}" y2="${-maxy}"/>`;
  g += `<text class="dimtxt" x="${xl - dh*0.4}" y="${-(miny+maxy)/2}" text-anchor="end" dominant-baseline="middle">${h.toFixed(0)}</text>`;
  svg.innerHTML = g;
}

function emptyStage(msg) {
  if (model) { scene.remove(model); model = null; }
  if (grid)  { scene.remove(grid);  grid  = null; }
  const m = msg || "No model loaded.";
  const empty = $("#empty"); empty.hidden = false; empty.querySelector(".msg").textContent = m;
  $("#badge").textContent = "no model";
  $("#tree").innerHTML = '<span class="ind">— nothing loaded yet</span>';
  $("#props").innerHTML =
    `<div style="color:var(--muted);font-size:12px;padding:8px 0">${m}</div>`;
}

// A small automation/debug seam (browser console + headless E2E) — the controller, not a network
// surface. Exposes render + selection so the Stage's Point-to-Navigate / Ambient wash are testable.
window.LUDWIG = {
  render, selectFromStage, clearStageSelection,
  toggleSection, sectionAt: (axis, offset)=> liveSection(axis, offset, true),   // R33 headless seam
  setRep, renderSketch2d, get rep(){ return REP; },                             // R34 headless seam
  // R10 face-drag headless seam: bind an axis (0/1/2) to its extent dim, stream a live preview, optionally commit
  faceDragTo: (axisIndex, newValue, commit)=>{
    const dim = dimForAxis(axisIndex); if(!dim) return null;
    livePreview({ name:dim.name, old:dim.value, new:newValue });
    if(commit) applyEdit(`make the ${dim.name} ${newValue} mm`, { name:dim.name, old:dim.value, new:newValue });
    return { dim:dim.name, old:dim.value };
  },
  get gizmo(){ return faceGizmo ? faceGizmo.userData.face : null; },
  // project a world point to canvas client (x,y) — headless helper for synthetic-pointer drag tests
  _screenOf(x,y,z){ const r=canvas.getBoundingClientRect();
    const p=new THREE.Vector3(x,y,z).project(cam);
    return { x:r.left+(p.x*0.5+0.5)*r.width, y:r.top+(-p.y*0.5+0.5)*r.height }; },
  _gizmoTip(){ if(!faceGizmo) return null; const p=new THREE.Vector3();
    faceGizmo.children[1].getWorldPosition(p); return this._screenOf(p.x,p.y,p.z); },
  state: STATE, section: SECTION,
  get ambient(){ return { overall: AMBIENT.overall, byId: AMBIENT.byId,
    mats: Object.fromEntries(Object.entries(childMats).map(
      ([id, m]) => [id, { hex: m.emissive.getHex(), opacity: m.opacity }])) }; },
};

/* ===================== gallery + seed boot (token-free, server-trusted seeds) =====================
   The browser never sends a program to execute (RCE). It loads trusted seeds by id; in DEMO mode the
   server only accepts those + numeric edits (webapp/safety.py). All token-free — no inference cost. */
let DEMO = false, SEEDS = [];
const SEED_FALLBACK = [   // only used if /api/gallery is unavailable (older local server)
  'element = box("bracket", 80, 40, 6)',
  'clearance_hole(element, "M8", (-25, 0))',
  'clearance_hole(element, "M8", (25, 0))',
].join("\n");

function renderGallery(seeds){
  const box = $("#gallery"); if(!box) return; box.innerHTML = "";
  if(!seeds.length){ box.innerHTML = '<span class="ind" style="font-size:11px">— gallery unavailable</span>'; return; }
  seeds.forEach(s => {
    const b = document.createElement("button"); b.className = "gitem";
    b.innerHTML = `<span class="gt"></span><span class="gb"></span>`;
    b.querySelector(".gt").textContent = s.title; b.querySelector(".gb").textContent = s.blurb;
    b.onclick = () => adoptSeed(s.id, s.title);
    box.appendChild(b);
  });
}
async function adoptSeed(id, title){
  try {
    const d = await fetch("/api/adopt", { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ seed: id }) }).then(r => r.json());
    if(d.fatal){ log("sys", "load failed: " + d.fatal, "err"); return; }
    render(d);
    log("you", "load " + id);
    log("sys", "loaded " + (title||id) + (d.bbox ? ` · ${d.bbox.length}×${d.bbox.width}×${d.bbox.height} mm` : ""), "ok");
  } catch(e){ log("sys", "load failed: " + e, "err"); }
}
async function bootModel(){
  try {
    const g = await fetch("/api/gallery").then(r => r.json());
    DEMO = !!g.demo; SEEDS = g.seeds || [];
    renderGallery(SEEDS);
  } catch(e){ /* no gallery endpoint — fall back to the embedded seed below */ }
  const first = SEEDS[0];
  try {
    const resp = await fetch("/api/adopt", { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(first ? { seed: first.id } : { program: SEED_FALLBACK }) });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const d = await resp.json();
    if(d.fatal) throw new Error(d.fatal);
    render(d);
    log("sys", `loaded ${d.id||"?"} — ${d.type||"?"}` + (d.bbox ? ` · ${d.bbox.length}×${d.bbox.width}×${d.bbox.height} mm` : ""), "ok");
    if(DEMO) log("sys", "demo — drag a dimension to edit (free, no AI); pick another part from the Gallery. Generation runs locally with your own key.");
  } catch (e) {
    emptyStage("no model — start the engine");
    log("sys", "Engine not available. Start the server with: .venv/bin/python cli.py --serve", "warn");
    log("sys", `detail: ${e.message}`, "warn");
  }
}

/* ===================== footer: command line + agent lane (stubbed) ===================== */
function log(who, msg, cls){
  const l=$("#log"); const d=document.createElement("div"); d.className="ln";
  d.innerHTML=`<span class="who ${who}">${who}</span><span class="msg ${cls||""}"></span>`;
  d.querySelector(".msg").textContent=msg; l.appendChild(d); l.scrollTop=l.scrollHeight;
}
const VIEWDIR={ top:[0,0,1], bottom:[0,0,-1], front:[0,-1,0], back:[0,1,0],
  right:[1,0,0], left:[-1,0,0], iso:[0.85,-1,0.62] };
function setView(name){ const d=VIEWDIR[name]; if(d){ userMoved=false; frame(new THREE.Vector3(...d)); } }
function setCam(which){
  cam = which==="ortho"? ortho : persp; controls.object=cam;
  $("#cam-persp").classList.toggle("on", which!=="ortho");
  $("#cam-ortho").classList.toggle("on", which==="ortho");
  frame(); controls.update();
}
function runCommand(raw){
  const s=raw.trim(); if(!s) return;
  const [cmd,...rest]=s.split(/\s+/); const k=cmd.toLowerCase();
  if(VIEWDIR[k]){ log("you",s); setView(k); log("sys","view: "+k); return; }
  if(k==="ortho"||k==="persp"){ log("you",s); setCam(k); log("sys","camera: "+k); return; }
  if(k==="fit"||k==="home"){ log("you",s); userMoved=false; frame(); log("sys","framed"); return; }
  if(k==="help"){ log("you",s);
    log("sys","view: iso · top · front · back · right · left · bottom · ortho · persp · fit");
    log("sys","anything else is a change request → routed through the real edit loop (/api/edit).");
    return;
  }
  // anything else is a change request — route it through the real edit loop (minimal-diff, fab-gated).
  if(!STATE.program){ log("you",s); log("sys","load a model first.","warn"); return; }
  applyEdit(s, null);
}

/* ===================== wiring ===================== */
function tagActive(sel, el){ document.querySelectorAll(sel).forEach(b=>b.classList.remove("on")); el.classList.add("on"); }
document.querySelectorAll("[data-view]").forEach(b=> b.addEventListener("click", ()=>setView(b.dataset.view)));
$("#b-fit").onclick = ()=>{ userMoved=false; frame(); };
$("#vp-fit").onclick = ()=>{ userMoved=false; frame(); };
$("#cam-persp").onclick=()=>setCam("persp"); $("#cam-ortho").onclick=()=>setCam("ortho");
$("#rep-3d").onclick=()=>setRep("3d"); $("#rep-2d").onclick=()=>setRep("2d");   // R34: 3D extrude ⇄ 2D sketch
$("#t-left").onclick =()=>document.body.classList.toggle("no-left");
$("#t-right").onclick=()=>document.body.classList.toggle("no-right");
$("#show-left").onclick =()=>document.body.classList.remove("no-left");
$("#show-right").onclick=()=>document.body.classList.remove("no-right");
$("#agentmode").onclick=()=>{ const e=$("#agentmode"); const plan=e.textContent.includes("Plan");
  e.innerHTML="agent · <b>"+(plan?"Build":"Plan")+"</b>"; log("sys","agent mode: "+(plan?"Build":"Plan")); };
document.querySelectorAll("[data-ltab]").forEach(t=> t.addEventListener("click", ()=>{
  tagActive("[data-ltab]", t);
  $("#ltab-tools").hidden = t.dataset.ltab!=="tools";
  $("#ltab-model").hidden = t.dataset.ltab!=="model";
}));
document.querySelectorAll(".tool").forEach(t=> t.addEventListener("click", ()=>{
  if(t.dataset.tool==="section"){ toggleSection(); return; }   // R33: live cut plane (own active state)
  tagActive(".tool", t);
  log("sys", t.dataset.tool+" tool — not wired yet (R3+).", "warn");
}));
["b-new","b-open","b-save"].forEach(id=> $("#"+id).addEventListener("click",
  ()=> log("sys", id.slice(2)+" — file ops not wired yet (shell).","warn")));
const cli=$("#cli");
$("#cli-send").onclick=()=>{ runCommand(cli.value); cli.value=""; };
cli.addEventListener("keydown", e=>{ if(e.key==="Enter"){ runCommand(cli.value); cli.value=""; } });

/* ===================== boot ===================== */
bootModel();
setView("iso");
log("sys", "Ludwig Studio (R1) — fetching real OCCT B-rep via /api/adopt…");
log("sys", "Commands: iso · top · front · ortho · persp · fit · left · right · help");
</script>
